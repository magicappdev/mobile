name: Mobile Unsigned Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  JAVA_VERSION: "21"
  BUN_VERSION: 1.3.10
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-unsigned-release:
    name: Build Android unsigned release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Java JDK
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018 # v4.2.2
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Gradle dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-mobile-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-mobile-gradle-

      - name: Compute Android release version metadata
        id: versioning
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          semver_core="${package_version%%-*}"
          IFS='.' read -r major minor patch <<< "${semver_core}"

          major="${major:-0}"
          minor="${minor:-0}"
          patch="${patch:-0}"

          run_number="${GITHUB_RUN_NUMBER:-0}"
          version_code=$((major * 10000000 + minor * 100000 + patch * 1000 + run_number))

          artifact_suffix="manual-${run_number}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            artifact_suffix="${GITHUB_REF_NAME}"
          fi

          artifact_base="magicappdev-android-release-unsigned-${artifact_suffix}"

          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "android_version_name=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "android_version_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "artifact_base=${artifact_base}" >> "${GITHUB_OUTPUT}"

      - name: Build web assets
        run: bun run build

      - name: Sync Capacitor Android project
        run: bunx cap sync android

      - name: Build Android unsigned release APK and AAB
        run: |
          set -euo pipefail
          cd android
          chmod +x gradlew
          ./gradlew --no-daemon --stacktrace assembleRelease bundleRelease
        env:
          ANDROID_VERSION_NAME: ${{ steps.versioning.outputs.android_version_name }}
          ANDROID_VERSION_CODE: ${{ steps.versioning.outputs.android_version_code }}
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Collect unsigned release artifacts
        id: artifacts
        run: |
          set -euo pipefail

          mkdir -p dist/release

          apk_source="$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          aab_source="$(find android/app/build/outputs/bundle/release -maxdepth 1 -type f -name '*.aab' | head -n 1)"

          if [[ -z "${apk_source}" ]]; then
            echo "Unsigned release APK not found." >&2
            exit 1
          fi

          if [[ -z "${aab_source}" ]]; then
            echo "Unsigned release AAB not found." >&2
            exit 1
          fi

          apk_target="dist/release/${{ steps.versioning.outputs.artifact_base }}.apk"
          aab_target="dist/release/${{ steps.versioning.outputs.artifact_base }}.aab"

          cp "${apk_source}" "${apk_target}"
          cp "${aab_source}" "${aab_target}"

          {
            echo "apk_path=${apk_target}"
            echo "aab_path=${aab_target}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.versioning.outputs.artifact_base }}
          path: |
            ${{ steps.artifacts.outputs.apk_path }}
            ${{ steps.artifacts.outputs.aab_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach artifacts to GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.apk_path }}
            ${{ steps.artifacts.outputs.aab_path }}
          fail_on_unmatched_files: true
