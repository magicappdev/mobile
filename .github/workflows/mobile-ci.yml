name: Mobile Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  JAVA_VERSION: '21'
  BUN_VERSION: 1.3.10
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-testing-apk:
    name: Build Android testing APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Java JDK
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018 # v4.2.2
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Gradle dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-mobile-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-mobile-gradle-

      - name: Compute Android release artifact metadata
        id: versioning
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          run_number="${GITHUB_RUN_NUMBER:-0}"

          artifact_suffix="manual-${run_number}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            artifact_suffix="${GITHUB_REF_NAME}"
          fi

          artifact_base="magicappdev-android-testing-debug-${artifact_suffix}"

          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "artifact_base=${artifact_base}" >> "${GITHUB_OUTPUT}"

      - name: Build web assets
        run: bun run build

      - name: Sync Capacitor Android project
        run: bunx cap sync android

      - name: Build Android testing APK
        run: |
          set -euo pipefail
          cd android
          chmod +x gradlew
          # Release APKs are unsigned by default in CI and are not installable for testing.
          # Build the debug variant so the workflow always produces an installable APK.
          ./gradlew --no-daemon --stacktrace assembleDebug
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Collect testing APK artifact
        id: artifacts
        run: |
          set -euo pipefail

          mkdir -p dist/release

          apk_source="android/app/build/outputs/apk/debug/app-debug.apk"

          if [[ ! -f "${apk_source}" ]]; then
            echo "Installable debug APK not found at ${apk_source}." >&2
            exit 1
          fi

          apk_target="dist/release/${{ steps.versioning.outputs.artifact_base }}.apk"

          cp "${apk_source}" "${apk_target}"

          echo "apk_path=${apk_target}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.versioning.outputs.artifact_base }}
          path: ${{ steps.artifacts.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Attach APK to GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifacts.outputs.apk_path }}
          fail_on_unmatched_files: true
