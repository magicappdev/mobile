name: Mobile Debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  JAVA_VERSION: '21'
  BUN_VERSION: 1.3.10
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Java JDK
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018 # v4.2.2
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Derive debug Android version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          VERSION_BASE=$(node -e "const version = require('./package.json').version; const parts = version.split('.').map((part) => { const match = part.match(/^(\d+)/); return match ? Number(match[1]) : 0; }); while (parts.length < 3) parts.push(0); process.stdout.write(String(parts[0] * 10000 + parts[1] * 100 + parts[2]));")
          ANDROID_VERSION_NAME="${PACKAGE_VERSION}-debug.${GITHUB_RUN_NUMBER}"
          ANDROID_VERSION_CODE=$((GITHUB_RUN_NUMBER * 1000 + VERSION_BASE))

          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_NAME=${ANDROID_VERSION_NAME}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=${ANDROID_VERSION_CODE}" >> "$GITHUB_ENV"
          echo "DEBUG_ARTIFACT_NAME=mobile-debug-apk-${ANDROID_VERSION_NAME}" >> "$GITHUB_ENV"

      - name: Build Web Assets
        run: bun run build

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Cache Gradle dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-mobile-debug-gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-mobile-debug-gradle-

      - name: Build Android APK (Debug)
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
          ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"
          ORG_GRADLE_PROJECT_jvmArgs: -Xmx4g -XX:MaxMetaspaceSize=1024m
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEBUG_ARTIFACT_NAME }}
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
