name: Mobile Debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 22
  JAVA_VERSION: '21'
  BUN_VERSION: 1.3.10
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Java JDK
        uses: actions/setup-java@6a0805fcefea3d4657a47ac4c165951e33482018 # v4.2.2
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Derive debug artifact metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          debug_artifact_name="mobile-debug-apk-${package_version}-run-${GITHUB_RUN_NUMBER}"

          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "debug_artifact_name=${debug_artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Build Web Assets
        run: bun run build

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Cache Gradle dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-mobile-debug-gradle-${{ hashFiles('android/**/*.gradle', 'android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-mobile-debug-gradle-

      - name: Build Android APK (Debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"
          ORG_GRADLE_PROJECT_jvmArgs: -Xmx4g -XX:MaxMetaspaceSize=1024m
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.debug_artifact_name }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
